name: Code Lint (PEP8)

on:
  push:
    branches:
      - "**"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . --count --statistics --output-file=flake8-report.txt || true

      - name: Comment on commit
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('flake8-report.txt', 'utf8');

            const body = report.trim().length === 0
              ? "✅ No linting issues found. Clean code!"
              : `⚠️ **Linting Issues Found (PEP8):**\n\`\`\`\n${report}\n\`\`\``;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });