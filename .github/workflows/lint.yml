name: Code Lint (PEP8)

on:
  push:
    branches:
      - "**"
  pull_request:           

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . --count --statistics --output-file=flake8-report.txt || true

      - name: Comment on PR
        if: github.event_name == 'pull_request'   # ← only runs on PRs
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('flake8-report.txt', 'utf8');

            const body = report.trim().length === 0
              ? "✅ No linting issues found. Clean code!"
              : `⚠️ **Linting Issues Found (PEP8):**\n\`\`\`\n${report}\n\`\`\``;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,  // PR number
              body: body
            });

      - name: Write job summary (for push events)
        if: github.event_name == 'push'            # ← fallback for direct pushes
        run: |
          REPORT=$(cat flake8-report.txt)
          if [ -z "$REPORT" ]; then
            echo "## ✅ No linting issues found." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Linting Issues (PEP8)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat flake8-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi